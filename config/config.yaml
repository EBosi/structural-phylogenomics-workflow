metadata:
  accession_file: "metadata/accessions.txt"
  ncbi_eutils_base: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils"
  request_timeout_seconds: 60

downloads:
  output_dir: "data/genomes"
  curl_path: "/home/bosi/miniforge3/bin/curl"

preprocessing:
  min_contig_length: 1000
  normalize_headers: true
  uppercase_sequences: true

organelle_screen:
  enabled: true
  organelle_types: ["mitochondrion"]
  esearch_path: "/home/bosi/miniforge3/bin/esearch"
  efetch_path: "/home/bosi/miniforge3/bin/efetch"
  blastn_path: "/home/bosi/miniforge3/bin/blastn"
  makeblastdb_path: "/home/bosi/miniforge3/bin/makeblastdb"
  remove_classes: ["organelle_confident"]
  confident_identity: 85.0
  confident_query_coverage: 50.0
  ambiguous_identity: 75.0
  ambiguous_query_coverage: 20.0

repeat_annotation:
  tool: "dustmasker"
  dustmasker_path: "/home/bosi/miniforge3/bin/dustmasker"
  dust_window: 64
  dust_level: 20
  dust_linker: 1
  hard_masking: true

kmers:
  k_values: [5, 6, 7, 8]
  datasets: ["unmasked", "masked"]
  canonical: true
  normalization: "frequency"

distances:
  metrics: ["cosine", "jensen_shannon"]

trees:
  methods: ["nj", "upgma"]

resampling:
  datasets: ["masked"]
  k_values: [7]
  metrics: ["jensen_shannon"]
  methods: ["nj"]
  window_size: 100000
  step_size: 100000
  min_window_length: 50000
  bootstrap_replicates: 20
  jackknife_replicates: 20
  jackknife_fraction: 0.8
  random_seed: 42

sketch:
  datasets: ["unmasked", "masked"]
  k_values: [15, 17, 21]
  num_hashes: 1000
  canonical: true
  methods: ["nj", "upgma"]
